<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | NSMB-MarioVsLuigi</title>
    <style>
      /* Prevent scrollbars and center everything */
      body { padding: 0; border: 0; margin: 0; text-align: center; background: #000; overflow: hidden; }
      
      /* The Loading Overlay */
      #unity-loader-ready {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99;
      }

      /* The Loading Bar Container */
      #loader-bar {
        width: 250px;
        height: 10px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 20px;
      }

      /* The Moving Fill */
      #loader-fill {
        width: 0%;
        height: 100%;
        background: #e50914; /* Mario Red */
        transition: width 0.2s;
      }

      #loader-text {
        color: white;
        font-family: sans-serif;
        font-size: 14px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="unity-loader-ready">
      <div id="loader-text">LOADING... 0%</div>
      <div id="loader-bar">
        <div id="loader-fill"></div>
      </div>
    </div>

    <canvas id="unity-canvas" width=960 height=540 tabindex="-1" style="width: 100%; height: 100%; background: #CCCCCC"></canvas>

    <script src="Build/MarioVsLuigi-WebGL.loader.js"></script>
    <script>
      // Elements for the loader
      const loaderContainer = document.querySelector("#unity-loader-ready");
      const loaderFill = document.querySelector("#loader-fill");
      const loaderText = document.querySelector("#loader-text");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      // Updated createUnityInstance with progress and success callbacks
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MarioVsLuigi-WebGL.data.unityweb",
        frameworkUrl: "Build/MarioVsLuigi-WebGL.framework.js.unityweb",
        codeUrl: "Build/MarioVsLuigi-WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ipodtouch0218",
        productName: "NSMB-MarioVsLuigi",
        productVersion: "2.0.4.1",
      }, (progress) => {
        // Update the bar and text
        const percentage = Math.round(progress * 100);
        loaderFill.style.width = percentage + "%";
        loaderText.innerHTML = "LOADING... " + percentage + "%";
      }).then((unityInstance) => {
        // Remove the loader when finished
        loaderContainer.style.display = "none";
      }).catch((message) => {
        alert("Error loading game: " + message);
      });
    </script>
  </body>
</html>
