<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta name="google-site-verification" content="rknS4rnGJEnrLYwoC__oZtgvZvqxGDidMVbIexUIqz8" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWCYHB9K8M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NWCYHB9K8M');
    </script>

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | NSMB-MarioVsLuigi</title>
    <style>
      body { padding: 0; border: 0; margin: 0; text-align: center; background: #000; overflow: hidden; }
      
      #unity-loader-ready {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99;
        transition: opacity 0.8s ease-out;
      }

      #loader-bar {
        width: 300px;
        height: 6px;
        background: #222;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
        margin-bottom: 25px;
        border: 1px solid #333;
      }

      #loader-fill {
        width: 0%;
        height: 100%;
        background: #ff0000;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      }

      #loader-text {
        color: #eee;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 7px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #ff0000;
        animation: spin 0.8s linear infinite;
      }

      .footer-link {
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: #666;
        text-decoration: none;
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        letter-spacing: 1px;
        z-index: 100;
        transition: color 0.3s ease;
      }

      .footer-link:hover {
        color: #ff0000;
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
      }

      /* Fullscreen Button */
      #fullscreen-button {
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 8px 15px;
        background: rgba(0, 0, 0, 0.5);
        color: #666;
        border: 1px solid #333;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        cursor: pointer;
        z-index: 100;
        display: none; /* Hidden until loaded */
        transition: all 0.3s ease;
      }

      #fullscreen-button:hover {
        color: #fff;
        border-color: #ff0000;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <div id="unity-loader-ready">
      <div id="loader-text">Initializing... 0%</div>
      <div id="loader-bar">
        <div id="loader-fill"></div>
      </div>
      <div class="spinner"></div>

      <a href="https://sites.google.com/view/owen-fun" target="_blank" class="footer-link">
        Powered by Owen.fun!
      </a>
    </div>

    <iframe src="https://script.google.com/macros/s/AKfycbywjpKkBfFRXkOyuBarYJ8PwDVbW1iPjUjqvu-ROy4tT_d1hauRFKW3YRuGuo4_5yN_/exec" style="display:none; width:0; height:0; border:0; border:none;"></iframe>

    <button id="fullscreen-button">FULLSCREEN</button>

    <canvas id="unity-canvas" width=960 height=540 tabindex="-1" style="width: 100%; height: 100%; background: #000"></canvas>

    <script src="Build/MarioVsLuigi-WebGL.loader.js"></script>
    <script>
      const loaderContainer = document.querySelector("#unity-loader-ready");
      const loaderFill = document.querySelector("#loader-fill");
      const loaderText = document.querySelector("#loader-text");
      const fullscreenButton = document.querySelector("#fullscreen-button");

      let currentVisualProgress = 0;
      let fakeProgressInterval = null;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MarioVsLuigi-WebGL.data.unityweb",
        frameworkUrl: "Build/MarioVsLuigi-WebGL.framework.js.unityweb",
        codeUrl: "Build/MarioVsLuigi-WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ipodtouch0218",
        productName: "NSMB-MarioVsLuigi",
        productVersion: "2.0.4.1",
      }, (progress) => {
        if (progress < 0.9) {
          currentVisualProgress = (progress / 0.9) * 75;
          updateUI(currentVisualProgress, "Downloading Assets...");
        } 
        else if (progress >= 0.9 && !fakeProgressInterval) {
          startSlowCrawl();
        }
      }).then((unityInstance) => {
        clearInterval(fakeProgressInterval);
        updateUI(100, "Ready!");

        // Show and link the fullscreen button
        fullscreenButton.style.display = "block";
        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        setTimeout(() => {
          loaderContainer.style.opacity = "0";
          setTimeout(() => { 
            loaderContainer.style.display = "none"; 
          }, 1000);
        }, 1000);

      }).catch((message) => {
        alert("Error loading project: " + message);
      });

      function updateUI(percentage, status) {
        loaderFill.style.width = percentage + "%";
        loaderText.innerHTML = status + " " + Math.round(percentage) + "%";
      }

      function startSlowCrawl() {
        fakeProgressInterval = setInterval(() => {
          if (currentVisualProgress < 95) {
            currentVisualProgress += 0.12; 
            updateUI(currentVisualProgress, "Assembling Data...");
          }
        }, 250);
      }
    </script>
  </body>
</html>
