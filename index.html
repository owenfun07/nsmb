<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | NSMB-MarioVsLuigi</title>
    <style>
      body { padding: 0; border: 0; margin: 0; text-align: center; background: #000; overflow: hidden; }
      
      #unity-loader-ready {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99;
      }

      #loader-bar {
        width: 300px;
        height: 4px;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
      }

      #loader-fill {
        width: 0%;
        height: 100%;
        background: #ff0000;
        box-shadow: 0 0 10px #ff0000;
        transition: width 0.5s ease-out;
      }

      #loader-text {
        color: #ccc;
        font-family: sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>

    <div id="unity-loader-ready">
      <div id="loader-text">Initializing... 0%</div>
      <div id="loader-bar">
        <div id="loader-fill"></div>
      </div>
    </div>

    <canvas id="unity-canvas" width=960 height=540 tabindex="-1" style="width: 100%; height: 100%; background: #000"></canvas>

    <script src="Build/MarioVsLuigi-WebGL.loader.js"></script>
    <script>
      const loaderContainer = document.querySelector("#unity-loader-ready");
      const loaderFill = document.querySelector("#loader-fill");
      const loaderText = document.querySelector("#loader-text");

      let currentVisualProgress = 0;
      let fakeProgressInterval = null;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MarioVsLuigi-WebGL.data.unityweb",
        frameworkUrl: "Build/MarioVsLuigi-WebGL.framework.js.unityweb",
        codeUrl: "Build/MarioVsLuigi-WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ipodtouch0218",
        productName: "NSMB-MarioVsLuigi",
        productVersion: "2.0.4.1",
      }, (progress) => {
        // 1. Download Phase (0% to 90% Unity progress maps to 0% to 75% visual)
        if (progress < 0.9) {
          currentVisualProgress = (progress / 0.9) * 75;
          updateUI(currentVisualProgress, "Downloading Assets...");
        } 
        // 2. Start the slow crawl once we hit that 90% (75% visual) mark
        else if (progress >= 0.9 && !fakeProgressInterval) {
          startSlowCrawl();
        }
      }).then((unityInstance) => {
        // 3. Final Phase: Clear the timer and snap to 100%
        clearInterval(fakeProgressInterval);
        updateUI(100, "Ready!");
        setTimeout(() => {
          loaderContainer.style.opacity = "0";
          setTimeout(() => { loaderContainer.style.display = "none"; }, 500);
        }, 500);
      }).catch((message) => {
        alert(message);
      });

      function updateUI(percentage, status) {
        loaderFill.style.width = percentage + "%";
        loaderText.innerHTML = status + " " + Math.round(percentage) + "%";
      }

      function startSlowCrawl() {
        // Every 300ms, add a tiny bit of progress to keep the bar moving
        fakeProgressInterval = setInterval(() => {
          if (currentVisualProgress < 95) {
            currentVisualProgress += 0.2; // Adjust this number to change crawl speed
            updateUI(currentVisualProgress, "Processing Data...");
          }
        }, 300);
      }
    </script>
  </body>
</html>
