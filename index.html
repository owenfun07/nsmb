<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta name="google-site-verification" content="rknS4rnGJEnrLYwoC__oZtgvZvqxGDidMVbIexUIqz8" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWCYHB9K8M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NWCYHB9K8M');
    </script>

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | NSMB-MarioVsLuigi</title>
    <style>
      body { padding: 0; border: 0; margin: 0; text-align: center; background: #000; overflow: hidden; }
      
      #unity-loader-ready {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        background: #111; 
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99; transition: opacity 0.8s ease-out;
      }

      #loader-bg-image {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        opacity: 0.1;
        background-position: center; background-repeat: no-repeat; background-size: cover;
        z-index: -1;
      }

      #loader-text {
        color: #eee; font-family: 'Courier New', Courier, monospace;
        font-size: 14px; font-weight: bold; text-transform: uppercase;
        margin-bottom: 10px; text-shadow: 0 0 8px #000;
      }

      #loader-bar {
        width: 300px; height: 10px;
        background: rgba(34, 34, 34, 0.9);
        border-radius: 10px; overflow: hidden;
        border: 1px solid #444; margin-bottom: 25px;
      }

      #loader-fill {
        width: 0%; height: 100%;
        background: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        transition: width 0.4s ease-out;
      }

      #clicker-game {
        display: flex; align-items: flex-end; justify-content: center;
        gap: 25px; position: relative; margin-bottom: 10px; padding-bottom: 20px;
      }

      #mario-animation {
        width: 75px; height: auto; mix-blend-mode: screen; 
      }

      #block-container {
        display: flex; flex-direction: column; align-items: center;
        cursor: pointer; user-select: none; position: relative;
      }

      .img-normal {
        width: 62px;
        height: 60px;
        object-fit: contain;
        transition: transform 0.1s ease;
      }

      .img-empty {
        width: 60px;
        height: 60px;
        object-fit: contain;
        transition: transform 0.1s ease;
      }

      #coin-score {
        color: #ffcc00; font-family: 'Courier New', Courier, monospace;
        font-size: 18px; font-weight: bold; margin-top: 5px;
        text-shadow: 2px 2px #000;
      }

      .floating-effect {
        position: absolute; width: 100%; text-align: center;
        top: -20px; font-family: 'Courier New', monospace;
        font-weight: bold; pointer-events: none; z-index: 101;
      }
      .coin-pop { color: #ffcc00; animation: floatUp 0.5s ease-out forwards; }
      .one-up-pop { color: #00ff00; font-size: 22px; animation: floatUp 1.2s ease-out forwards; text-shadow: 0 0 10px #00ff00; }

      @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-70px); }
      }

      #trivia-container {
        max-width: 450px; height: 60px;
        color: #bbb; font-family: 'Courier New', Courier, monospace;
        font-size: 13px; line-height: 1.4;
        text-shadow: 2px 2px 4px #000;
        transition: opacity 0.5s ease; padding: 0 20px;
      }

      #fullscreen-button {
        position: absolute; bottom: 20px; right: 20px;
        padding: 8px 15px; background: rgba(0,0,0,0.8);
        color: #888; border: 1px solid #333;
        font-family: 'Courier New', monospace; font-size: 11px;
        cursor: pointer; display: none;
      }

      .footer-link {
        position: absolute; bottom: 20px; left: 20px;
        color: #666; text-decoration: none; font-family: 'Courier New', monospace; font-size: 12px;
      }
    </style>
  </head>
  <body>

    <div id="unity-loader-ready">
      <div id="loader-bg-image"></div>
      <div id="loader-text">Warping to World... 0%</div>
      <div id="loader-bar"><div id="loader-fill"></div></div>

      <div id="clicker-game">
        <img id="mario-animation" src="https://s13.gifyu.com/images/bm99v.gif" alt="Mario">
        <div id="block-container" onclick="hitBlock()">
            <img id="q-block" class="img-normal" src="https://i.ibb.co/WWzWdQ3s/image.png" alt="Block">
            <div id="coin-score">x0</div>
        </div>
      </div>

      <div id="trivia-container">Welcome! Loading facts...</div>
      <a href="https://sites.google.com/view/owen-fun" target="_blank" class="footer-link">Owen.fun</a>
    </div>

    <button id="fullscreen-button">FULLSCREEN</button>
    <canvas id="unity-canvas" width=960 height=540 tabindex="-1" style="width: 100%; height: 100%; background: #000"></canvas>

    <script src="Build/MarioVsLuigi-WebGL.loader.js"></script>
    <script>
      const loaderContainer = document.querySelector("#unity-loader-ready");
      const loaderFill = document.querySelector("#loader-fill");
      const loaderText = document.querySelector("#loader-text");
      const triviaBox = document.querySelector("#trivia-container");
      const bgLayer = document.querySelector("#loader-bg-image");
      const qBlock = document.querySelector("#q-block");
      const blockContainer = document.querySelector("#block-container");
      const coinScoreDisp = document.querySelector("#coin-score");
      const fullscreenBtn = document.querySelector("#fullscreen-button");

      let coins = 0;
      let currentVisualProgress = 0;
      let fakeProgressInterval = null;

      function hitBlock() {
        coins++;
        coinScoreDisp.innerHTML = "x" + coins;
        qBlock.src = "https://i.ibb.co/W4smBnxF/image.png";
        qBlock.className = "img-empty";
        qBlock.style.transform = "translateY(-12px)";
        
        const coinEl = document.createElement("div");
        coinEl.className = "floating-effect coin-pop";
        coinEl.innerHTML = "+1";
        blockContainer.appendChild(coinEl);

        if (coins % 100 === 0) {
          const upEl = document.createElement("div");
          upEl.className = "floating-effect one-up-pop";
          upEl.innerHTML = "1-UP!";
          blockContainer.appendChild(upEl);
          setTimeout(() => upEl.remove(), 1200);
        }

        setTimeout(() => {
          qBlock.src = "https://i.ibb.co/WWzWdQ3s/image.png";
          qBlock.className = "img-normal";
          qBlock.style.transform = "translateY(0)";
          coinEl.remove();
        }, 150);
      }

      const bgImages = ["https://thumbs.dreamstime.com/b/vibrant-d-rendered-scene-inspired-classic-super-mario-video-game-image-features-iconic-elements-like-brick-blocks-404917322.jpg", "https://static.vecteezy.com/system/resources/thumbnails/020/036/654/small/fantasy-game-scenery-background-free-vector.jpg", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSV-lZTG2_otKhadam0wP-qtx_oTkRxgTKMEg&s"];
      bgLayer.style.backgroundImage = `url('${bgImages[Math.floor(Math.random() * bgImages.length)]}')`;

      const marioFacts = [
        "Mario's first appearance was in Donkey Kong (1981) as 'Jumpman'.",
        "The mushroom power-up is based on the real Amanita Muscaria fungus.",
        "The clouds and bushes in Super Mario Bros. are the same sprite!",
        "Luigi was originally a palette-swap of Mario for the 2nd player.",
        "Wario's name comes from 'warui', the Japanese word for 'bad'.",
        "Mario's mustache was used to make his nose stand out in 8-bit.",
        "Mario Mario and Luigi Mario—that's their official full names!",
        "The 1-Up sound is one of the most recognizable in gaming history."
      ];

      let factIndex = 0;
      setInterval(() => {
        triviaBox.style.opacity = 0;
        setTimeout(() => {
          factIndex = (factIndex + 1) % marioFacts.length;
          triviaBox.innerHTML = marioFacts[factIndex];
          triviaBox.style.opacity = 1;
        }, 500);
      }, 3000);

      // --- THE CORE UNITY LOADING CALL ---
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MarioVsLuigi-WebGL.data.unityweb",
        frameworkUrl: "Build/MarioVsLuigi-WebGL.framework.js.unityweb",
        codeUrl: "Build/MarioVsLuigi-WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ipodtouch0218",
        productName: "NSMB-MarioVsLuigi",
        productVersion: "2.0.4.1",
      }, (progress) => {
        if (progress < 0.9) {
          currentVisualProgress = (progress / 0.9) * 85; 
          updateUI(currentVisualProgress, "Downloading...");
        } else if (progress >= 0.9 && !fakeProgressInterval) {
          startSlowCrawl();
        }
      }).then((unityInstance) => {
        clearInterval(fakeProgressInterval);
        updateUI(100, "Ready!");
        fullscreenBtn.style.display = "block";
        fullscreenBtn.onclick = () => { unityInstance.SetFullscreen(1); };
        setTimeout(() => {
          loaderContainer.style.opacity = "0";
          setTimeout(() => { loaderContainer.style.display = "none"; }, 1000);
        }, 1200);
      });

      function startSlowCrawl() {
        fakeProgressInterval = setInterval(() => {
          if (currentVisualProgress < 95) {
            currentVisualProgress += 0.05;
            updateUI(currentVisualProgress, "Assembling Data...");
          }
        }, 200);
      }

      function updateUI(percentage, status) {
        loaderFill.style.width = percentage + "%";
        loaderText.innerHTML = status + " " + Math.round(percentage) + "%";
      }
    </script>
  </body>
</html>
